name: Bug report
description: Report a reproducible Paper2Repo problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the input type, page/API endpoint, and exact action sequence.
      placeholder: |
        1. Start with ...
        2. Upload/import ...
        3. Click/run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs or screenshots if useful.
    validations:
      required: true
  - type: textarea
    id: model_config
    attributes:
      label: Model configuration
      description: Mention the provider, base URL, and model name if the issue involves model-assisted analysis.
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Docker Desktop, Python 3.12, Node 22"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
