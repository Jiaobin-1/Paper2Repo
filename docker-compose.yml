services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/paper2repo.db
      - UPLOAD_DIR=./storage/uploads
      - REPORT_DIR=./storage/reports
    volumes:
      - db-data:/app/data
      - upload-data:/app/storage/uploads
      - report-data:/app/storage/reports
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  upload-data:
  report-data:
